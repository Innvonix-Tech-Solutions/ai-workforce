<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innvonix Tech Solutions — Corporate Brochure 2026</title>
<style>
:root {
  --ink: #0B0B0F;
  --g1: #17181C;
  --g2: #2B2D33;
  --muted: #6B7280;
  --line: #E5E7EB;
  --paper: #FFFFFF;
  --surf: #F9FAFB;
  --or: #E56B2E;
  --or2: #C85218;
  --am: #F0A43A;
  --pl: #8A38C9;
  --brand: linear-gradient(135deg, #F0A43A 0%, #E56B2E 42%, #8A38C9 100%);
  --dark-bg: linear-gradient(160deg, #0D0D12 0%, #141120 55%, #1A1626 100%);
  --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  scroll-snap-type: y mandatory;
}

body {
  background: var(--paper);
  font-family: Inter, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
  color: var(--ink);
  overflow-x: hidden;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
@keyframes brandBarIn { to { opacity: 1; } }
@keyframes pulse { 0%,100% { box-shadow: 0 12px 40px rgba(11,11,15,.06); } 50% { box-shadow: 0 12px 50px rgba(11,11,15,.12); } }
@keyframes gridMove { 0% { transform: translate(0, 0); } 100% { transform: translate(2rem, 2rem); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInRight { from { opacity: 0; transform: translateY(-50%) translateX(30px); } to { opacity: 1; transform: translateY(-50%) translateX(0); } }
@keyframes fadeInScale { to { opacity: 1; transform: scale(1); } }
@keyframes bounce { 0%,20%,50%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
@keyframes countUp { to { opacity: 1; } }

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: slideDown 0.6s ease-out;
  transition: var(--transition);
}

.logo-header { height: 2rem; width: auto; }

.nav-links {
  display: flex;
  gap: 2rem;
  font-size: 0.875rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.nav-links a { color: inherit; text-decoration: none; transition: var(--transition); }
.nav-links a:hover { color: var(--or); transform: translateY(-2px); }

/* ===== SECTIONS ===== */
.section {
  min-height: 100vh;
  padding: 6rem 5vw;
  display: flex;
  flex-direction: column;
  scroll-snap-align: start;
  position: relative;
  overflow: hidden;
}
.section::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--brand);
  z-index: 10;
  opacity: 0;
  animation: brandBarIn 1s ease-out 0.3s forwards;
}
.section-content { max-width: 1200px; margin: 0 auto; width: 100%; }

/* ===== COVER SECTION ===== */
.cover {
  background:
    radial-gradient(ellipse at 15% 25%, rgba(240,164,58,.14) 0%, transparent 38%),
    radial-gradient(ellipse at 85% 18%, rgba(138,56,201,.10) 0%, transparent 35%),
    radial-gradient(ellipse at 50% 85%, rgba(229,107,46,.07) 0%, transparent 40%),
    var(--surf);
  position: relative;
}
.cover::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(11,11,15,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(11,11,15,.028) 1px, transparent 1px);
  background-size: 5rem 5rem;
  mask-image: linear-gradient(180deg, rgba(0,0,0,.45) 0%, transparent 80%);
}
.cover-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(11,11,15,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(11,11,15,.028) 1px, transparent 1px);
  background-size: 5rem 5rem;
  mask-image: linear-gradient(180deg, rgba(0,0,0,.45) 0%, transparent 80%);
  animation: gridMove 20s linear infinite;
}
.cover-content { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; height: 100%; }
.cover-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; animation: fadeInUp 0.8s ease-out 0.4s forwards; opacity: 0; }
.cover-top .ed { text-align: right; font-size: 0.875rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); line-height: 1.8; }
.logo-xl { height: 3.5rem; width: auto; display: block; }
.cover-hero { margin-top: 2rem; animation: fadeInUp 0.8s ease-out 0.5s forwards; opacity: 0; }
.cover-hero .pretag { font-size: 1rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 1.5rem; }
.cover-hero h1 { font-size: clamp(2.5rem, 8vw, 6rem); line-height: 0.9; letter-spacing: -0.055em; font-weight: 800; color: var(--ink); margin-bottom: 1.5rem; }
.cover-hero .sub { margin-top: 1.5rem; font-size: clamp(1rem, 2vw, 1.2rem); line-height: 1.48; color: #4B5563; max-width: 80%; }
.cover-bottom { border-top: 1px solid var(--line); padding-top: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin-top: auto; animation: fadeInUp 0.8s ease-out 0.6s forwards; opacity: 0; }
.cover-bottom .cel small { display: block; font-size: 0.875rem; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 0.5rem; }
.cover-bottom .cel div { font-size: 1rem; line-height: 1.45; color: var(--ink); font-weight: 600; }
.cover-tag {
  position: absolute;
  right: 5%;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  animation: fadeInRight 0.8s ease-out 0.7s forwards;
  opacity: 0;
}
.cover-tag .ring {
  width: 8rem;
  height: 8rem;
  border-radius: 50%;
  border: 1px solid rgba(11,11,15,.08);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.7);
  box-shadow: 0 12px 40px rgba(11,11,15,.06);
  position: relative;
  animation: pulse 3s ease-in-out infinite;
}
.cover-tag .ring::before { content: ""; width: 6rem; height: 6rem; border-radius: 50%; border: 1px solid rgba(229,107,46,.3); }

/* ===== DARK SECTION ===== */
.dark-section { background: var(--dark-bg); color: #fff; }
.dark-section .section::before { opacity: 0.6; }

/* ===== TYPOGRAPHY ===== */
.eyebrow {
  font-size: 0.875rem;
  text-transform: uppercase;
  letter-spacing: 0.36em;
  color: var(--or);
  font-weight: 700;
  margin-bottom: 2rem;
  animation: fadeInUp 0.8s ease-out forwards;
  opacity: 0;
}
.eyebrow.light { color: rgba(255,255,255,.55); }
.eyebrow.light .n { color: #fff; }
.eyebrow .n { color: var(--ink); margin-right: 0.5rem; font-weight: 800; }
h1.disp { font-size: clamp(2.5rem, 6vw, 4rem); line-height: 0.91; letter-spacing: -0.052em; font-weight: 800; color: var(--ink); animation: fadeInUp 0.8s ease-out 0.1s forwards; opacity: 0; }
h1.disp.white { color: #fff; }
h2.hed { font-size: clamp(2rem, 5vw, 3rem); line-height: 1.02; letter-spacing: -0.04em; font-weight: 800; color: var(--ink); animation: fadeInUp 0.8s ease-out 0.1s forwards; opacity: 0; }
h2.hed .sec { color: var(--muted); display: block; font-weight: 700; }
.lede { font-size: clamp(1rem, 2vw, 1.1rem); line-height: 1.45; color: #4B5563; max-width: 80%; margin-top: 1.5rem; animation: fadeInUp 0.8s ease-out 0.2s forwards; opacity: 0; }
.lede.w { color: rgba(255,255,255,.72); }
p { font-size: clamp(0.9rem, 1.5vw, 1rem); line-height: 1.58; color: #4B5563; animation: fadeInUp 0.8s ease-out 0.3s forwards; opacity: 0; }
p.sm { font-size: 0.875rem; }
.grad { background: var(--brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.or { color: var(--or); }
.muted { color: var(--muted); }
.divider { height: 2px; background: var(--line); margin: 3rem 0; }
.grow { flex: 1; }

/* ===== STATS ===== */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 3rem; border-top: 1px solid var(--line); padding-top: 2rem; }
.stat-b { padding: 1.5rem 0; border-right: 1px solid var(--line); }
.stat-b:last-child { border-right: none; }
.stat-b .num { font-size: clamp(2.5rem, 6vw, 4rem); line-height: 1; letter-spacing: -0.05em; font-weight: 800; color: var(--ink); animation: countUp 2s ease-out forwards; opacity: 0; }
.stat-b .num em { font-style: normal; color: var(--or); }
.stat-b .lbl { margin-top: 1rem; font-size: 0.875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
.stat-b .desc { margin-top: 0.75rem; font-size: 0.875rem; line-height: 1.5; color: #4B5563; }

/* ===== GRID CAPS ===== */
.gcap { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem; border-top: 1px solid var(--line); padding-top: 2rem; }
.cap { padding: 1.5rem 0; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); transition: var(--transition); }
.cap:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
.cap:nth-child(4n) { border-right: none; }
.cap:nth-child(n+5) { border-bottom: none; }
.cap .ic { width: 2.5rem; height: 2.5rem; margin-bottom: 1.5rem; color: var(--ink); }
.cap h3 { font-size: 1rem; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); margin-bottom: 0.75rem; }
.cap p { font-size: 0.875rem; line-height: 1.5; }

/* ===== FLOW ===== */
.flow { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem; }
.flow-step {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 1rem;
  padding: 2rem 1.5rem;
  transition: var(--transition);
  animation: fadeInScale 0.6s ease-out forwards;
  opacity: 0;
}
.flow-step:nth-child(1) { animation-delay: 0.1s; transform: scale(0.9); }
.flow-step:nth-child(2) { animation-delay: 0.2s; transform: scale(0.9); }
.flow-step:nth-child(3) { animation-delay: 0.3s; transform: scale(0.9); }
.flow-step:nth-child(4) { animation-delay: 0.4s; transform: scale(0.9); }
.flow-step:nth-child(5) { animation-delay: 0.5s; transform: scale(0.9); }
.flow-step:nth-child(6) { animation-delay: 0.6s; transform: scale(0.9); }
.flow-step:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-color: var(--or); }
.flow-step .ring { width: 2rem; height: 2rem; border-radius: 50%; background: var(--or); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 800; margin-bottom: 1.5rem; }
.flow-step h4 { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; color: var(--ink); line-height: 1.2; }
.flow-step p { margin-top: 0.5rem; font-size: 0.875rem; color: var(--muted); line-height: 1.5; }

/* ===== CASE STUDY ===== */
.case-hero {
  margin-top: 2rem;
  height: 30vh;
  min-height: 200px;
  border-radius: 1rem;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}
.case-hero .ct { position: absolute; top: 2rem; left: 2rem; right: 2rem; font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 800; letter-spacing: -0.03em; color: #fff; line-height: 1; }
.case-hero .cl { position: absolute; bottom: 1.5rem; left: 2rem; font-size: 0.875rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,.65); font-weight: 600; }
.case-grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 2rem; margin-top: 2rem; }
.case-grid .meta { font-size: 0.875rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--or); font-weight: 700; margin-bottom: 1rem; }
.case-grid h3 { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 800; letter-spacing: -0.04em; color: var(--ink); line-height: 1; margin-bottom: 1.5rem; }
.case-grid .blk { margin-top: 1.5rem; }
.case-grid .blk h5 { font-size: 0.875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 0.75rem; }
.case-grid .blk p { font-size: 1rem; line-height: 1.5; }
.sc { background: var(--ink); color: #fff; padding: 2rem; border-radius: 1rem; }
.sc .si { padding: 1.5rem 0; border-bottom: 1px solid rgba(255,255,255,.12); }
.sc .si:last-child { border-bottom: none; }
.sc .sn { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; letter-spacing: -0.04em; color: #fff; line-height: 1; }
.sc .sl { margin-top: 0.5rem; font-size: 0.875rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,.55); font-weight: 600; }

/* ===== QUOTES ===== */
.qs { margin-top: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
.q { break-inside: avoid; }
.q q { quotes: "\"\\201C" "\"\\201D\"; font-size: clamp(1rem, 2vw, 1.2rem); line-height: 1.45; font-weight: 500; color: var(--ink); letter-spacing: -0.015em; display: block; }
.q q::before { content: open-quote; color: var(--or); }
.q q::after { content: close-quote; color: var(--or); }
.q .at { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--line); font-size: 0.875rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-weight: 600; }

/* ===== INDUSTRIES ===== */
.inds { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-top: 2rem; }
.ind { padding: 2rem 1.5rem; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line); transition: var(--transition); }
.ind:hover { background: rgba(240,164,58,0.03); }
.ind:nth-child(3n) { border-right: none; padding-right: 0; }
.ind:nth-child(n+4) { border-bottom: none; }
.ind .ico { width: 2.75rem; height: 2.75rem; color: var(--or); margin-bottom: 1.25rem; }
.ind h4 { font-size: 1.125rem; font-weight: 700; color: var(--ink); margin-bottom: 0.75rem; letter-spacing: -0.02em; }

/* ===== BADGES ===== */
.badges { margin-top: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
.badge { padding: 2rem; border: 1px solid var(--line); border-radius: 1rem; background: #fff; transition: var(--transition); }
.badge:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-color: var(--or); }
.badge .bl { font-size: 0.875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--or); font-weight: 700; }
.badge h4 { font-size: 1.2rem; font-weight: 700; color: var(--ink); margin-top: 1rem; letter-spacing: -0.02em; }
.badge p { margin-top: 0.75rem; font-size: 0.875rem; }

/* ===== TOC ===== */
.toc { list-style: none; margin-top: 2rem; columns: 2; column-gap: 2rem; }
.toc li { display: flex; align-items: baseline; padding: 1.25rem 0; border-bottom: 1px solid var(--line); break-inside: avoid; }
.toc .tn { font-size: 0.875rem; letter-spacing: 0.18em; color: var(--muted); font-weight: 600; width: 3rem; }
.toc .tt { flex: 1; font-size: 1.125rem; color: var(--ink); font-weight: 600; letter-spacing: -0.01em; }
.toc .tp { font-size: 0.875rem; color: var(--muted); font-weight: 500; letter-spacing: 0.2em; }

/* ===== MANIFESTO ===== */
.manifesto-q { font-size: clamp(2rem, 5vw, 3rem); line-height: 1.16; letter-spacing: -0.03em; font-weight: 600; color: var(--ink); margin-top: 2rem; animation: fadeInUp 0.8s ease-out 0.2s forwards; opacity: 0; }
.manifesto-q strong { font-weight: 800; }
.manifesto-q em { font-style: normal; color: var(--muted); }

/* ===== TRUST ===== */
.trust { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 2rem; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.trust-t { padding: 2rem 1.5rem; border-right: 1px solid var(--line); text-align: center; }
.trust-t:last-child { border-right: none; }
.trust-t .star { color: var(--or); font-size: 1.5rem; letter-spacing: 0.05em; }
.trust-t .tn { margin-top: 0.5rem; font-size: 1rem; font-weight: 700; color: var(--ink); }
.trust-t .tm { margin-top: 0.5rem; font-size: 0.875rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 600; }

/* ===== CTA ===== */
.cta-content { display: flex; flex-direction: column; justify-content: center; height: 100%; }
.cta-pg h1 { margin-top: 2rem; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 0.92; letter-spacing: -0.052em; font-weight: 800; color: #fff; animation: fadeInUp 0.8s ease-out 0.1s forwards; opacity: 0; }
.cta-pg h1 .sec { color: rgba(255,255,255,.4); display: block; }
.cta-pg .lede { color: rgba(255,255,255,.7); max-width: 70%; animation: fadeInUp 0.8s ease-out 0.2s forwards; opacity: 0; }
.cta-bottom { margin-top: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; border-top: 1px solid rgba(255,255,255,.12); padding-top: 2rem; animation: fadeInUp 0.8s ease-out 0.3s forwards; opacity: 0; }
.cta-bottom .cl small { display: block; font-size: 0.875rem; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(255,255,255,.5); font-weight: 700; margin-bottom: 0.5rem; }
.cta-bottom .cl div { font-size: 1rem; color: #fff; font-weight: 600; line-height: 1.4; }

/* ===== BACK COLOPHON ===== */
.back-pg { background: var(--surf); }
.back-pg h2 { font-size: clamp(2rem, 5vw, 3rem); line-height: 1.05; letter-spacing: -0.025em; font-weight: 700; color: var(--ink); }
.back-meta { margin-top: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; border-top: 1px solid var(--line); padding-top: 1.5rem; }
.back-meta .bc { padding-right: 1.5rem; }
.back-meta .bl { font-size: 0.875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 0.5rem; }
.back-meta .bv { font-size: 0.9rem; color: var(--ink); font-weight: 500; line-height: 1.5; }
.colophon-bar { border-top: 1px solid var(--line); padding-top: 1.5rem; display: flex; justify-content: space-between; font-size: 0.875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 600; }

/* ===== FOOTER ===== */
.footer {
  background: var(--ink);
  color: rgba(255,255,255,0.7);
  padding: 3rem 5vw;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.875rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
}
.footer a { color: var(--or); text-decoration: none; transition: var(--transition); }
.footer a:hover { color: var(--am); transform: translateY(-2px); }

/* ===== SCROLL INDICATOR ===== */
.scroll-indicator {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 3rem;
  height: 3rem;
  border-radius: 50%;
  background: var(--brand);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.5rem;
  z-index: 1000;
  animation: bounce 2s infinite;
  cursor: pointer;
  transition: var(--transition);
}
.scroll-indicator:hover { transform: translateY(-5px) scale(1.1); animation: none; }

/* ===== REVEAL ===== */
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
.reveal.revealed { opacity: 1; transform: translateY(0); }

/* ===== WHY ROWS ===== */
.why { margin-top: 2rem; }
.why-r { display: grid; grid-template-columns: 2.5rem 1fr 1.5fr; gap: 2rem; padding: 1.5rem 0; border-bottom: 1px solid var(--line); transition: var(--transition); }
.why-r:hover { background: rgba(240,164,58,0.02); }
.why-r .n { font-size: 0.875rem; letter-spacing: 0.18em; color: var(--muted); font-weight: 700; }
.why-r .t { font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 700; letter-spacing: -0.02em; color: var(--ink); line-height: 1.15; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .section { padding: 4rem 1rem; }
  .cover-bottom { grid-template-columns: 1fr; gap: 1rem; }
  .case-grid { grid-template-columns: 1fr; }
  .qs { grid-template-columns: 1fr; }
  .nav-links { display: none; }
  .header { padding: 1rem; }
